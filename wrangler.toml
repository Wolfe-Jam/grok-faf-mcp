name = "faf-grok"
compatibility_date = "2024-12-30"

# grok-faf-mcp web surface — Cloudflare canonical (grok.faf.one)
#
# Pure-static deployment via Workers Assets. The docs/ directory
# contains index.html — the live landing page (auto-syncs version
# from npm registry at page-load per commit 6e19f47).
#
# Surfaces (CF 100% as of 2026-05-31 — Vercel deprecated):
#   1. grok.faf.one                — THIS Worker (CF-edge canonical landing page)
#   2. mcpaas.live/grok/mcp/v1     — MCP endpoint (Cloudflare, served_by mcpaas-cf)
#   3. wolfe-jam.github.io/grok-faf-mcp/ — GitHub Pages mirror (serves same docs/)
#   4. faf.one/grok                — discovery page (SvelteKit route)
#
# Cloudflare is canonical for BOTH landing + MCP wire as of 2026-05-31.
# The legacy grok-faf-mcp.vercel.app surface is deprecated (api/index.ts
# + vercel.json kept pending v1.6 task #23 Vercel-infrastructure decision).
#
# Per `ask-before-going-live-website-deploys.md` doctrine, this
# config is staged + committed autonomously; the actual
# `wrangler deploy` requires explicit GO from wolfejam.
#
# Mirrors xai-faf-zeph/wrangler.toml — same pattern, different product.

routes = [
  { pattern = "grok.faf.one", custom_domain = true }
]

[assets]
directory = "./docs"
