version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps"
    # Group updates into a single PR — fewer threads, less maintenance churn
    groups:
      npm:
        patterns:
          - "*"
    # Security-only: ignore all version updates, only alert on vulnerabilities
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    # Group action bumps into a single monthly PR
    groups:
      github-actions:
        patterns:
          - "*"
