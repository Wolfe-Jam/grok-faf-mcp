# Smithery configuration for grok-faf-mcp
# https://smithery.ai/docs/build/project-config/smithery-yaml

name: grok-faf-mcp
description: "Grok FAF — persistent project context for xAI Grok via the IANA-registered .faf format. 12 core MCP tools (stdio via npx); hosted URL at mcpaas.live/grok/mcp/v1. Scoring, validation, refresh_faf, LAZY-RAG."
icon: https://raw.githubusercontent.com/Wolfe-Jam/grok-faf-mcp/main/assets/icons/faf-icon-256.png

startCommand:
  type: stdio
  configSchema:
    type: object
    properties: {}
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "grok-faf-mcp@latest"]
    })
